services:
  - type: web
    name: nebulastreams-v2
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CACHE_DIR
        value: /tmp/nebulastreams-cache
      - key: REDIS_URL
        sync: false
