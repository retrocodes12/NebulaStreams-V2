services:
  - type: web
    name: nebulastreams-v2
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CACHE_DIR
        value: /tmp/nebulastreams-cache
      - key: STREMIO_ADDON_ID
        value: community.nebulastreams.v2
      - key: STREMIO_ADDON_NAME
        value: NebulaStreams V2
      - key: PUBLIC_BASE_URL
        value: https://nebulastreams-v2.onrender.com
      - key: MAX_CACHE_SIZE_GB
        value: "10"
      - key: PROVIDER_MAX_CONCURRENCY
        value: "12"
      - key: PROVIDER_HOST_MAX_INFLIGHT
        value: "6"
      - key: PROVIDER_GLOBAL_MAX_INFLIGHT
        value: "48"
      - key: STREMIO_FAST_PROVIDER_CONCURRENCY
        value: "10"
      - key: STREMIO_FAST_PROVIDER_LIMIT
        value: "12"
      - key: STREMIO_FAST_STREAM_LIMIT
        value: "120"
      - key: STREMIO_MAX_INFLIGHT_SEARCHES
        value: "0"
      - key: MAX_ACTIVE_STREAMS
        value: "0"
      - key: STREMIO_BACKGROUND_REFRESH_CONCURRENCY
        value: "0"
      - key: STREMIO_BACKGROUND_REFRESH_QUEUE_MAX
        value: "0"
      - key: POPULAR_STREAM_PREWARM_ENABLED
        value: "false"
      - key: PROVIDER_EMPTY_CACHE_TTL_SECONDS
        value: "30"
      - key: STREMIO_EMPTY_RESULT_CACHE_TTL_SECONDS
        value: "1"
      - key: PUBLIC_RATE_LIMIT_MAX_REQUESTS
        value: "0"
      - key: STREAM_RATE_LIMIT_MAX_REQUESTS
        value: "0"
      - key: PROVIDER_RATE_LIMIT_MAX_REQUESTS
        value: "0"
      - key: PROVIDER_FAILURE_THRESHOLD
        value: "0"
      - key: PROVIDER_COOLDOWN_SECONDS
        value: "0"
      - key: PROVIDER_HOST_FAILURE_THRESHOLD
        value: "0"
      - key: PROVIDER_HOST_COOLDOWN_SECONDS
        value: "0"
      - key: MEMORY_GUARD_ENABLED
        value: "false"
      - key: BOT_PROTECTION_ENABLED
        value: "false"
      - key: HTTP_MAX_SOCKETS
        value: "128"
      - key: REDIS_URL
        sync: false
